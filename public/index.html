<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D7D6B" />
    <meta name="description" content="MediCore HMS — Hospital Management System" />
    <title>MediCore HMS</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #F4F7FA;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      /* Loading spinner shown before React mounts */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0A1628;
        z-index: 9999;
        transition: opacity 0.3s;
      }
      #initial-loader .logo {
        width: 56px; height: 56px;
        border-radius: 16px;
        background: #0D7D6B;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px;
        margin-bottom: 16px;
      }
      #initial-loader p {
        color: #8FA3C0;
        font-size: 14px;
        margin: 8px 0 0;
        letter-spacing: 0.05em;
      }
      #initial-loader h1 {
        color: #ffffff;
        font-size: 22px;
        margin: 0;
        font-weight: 700;
        letter-spacing: -0.3px;
      }
      .spinner {
        width: 28px; height: 28px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #0D7D6B;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-top: 24px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run MediCore HMS.</noscript>

    <!-- Splash shown while React bundle loads -->
    <div id="initial-loader">
      <div class="logo">⊕</div>
      <h1>MediCore HMS</h1>
      <p>Hospital Management System</p>
      <div class="spinner"></div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <script>
      // Hide splash once React has mounted
      window.addEventListener('load', function () {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function () { loader.remove(); }, 300);
        }
      });
    </script>
  </body>
</html>
